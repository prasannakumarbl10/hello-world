apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello

  template:
    metadata:
      labels:
        app: hello

    spec:
      containers:
      - name: hello-container
        image: prasanna25cs/hello-world:v1
        ports:
        - containerPort: 5000
